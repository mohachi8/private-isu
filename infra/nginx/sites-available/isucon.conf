server {
  listen 80;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  # Static assets: serve straight from disk, never touch the app.
  location ~* ^/(css|js|img)/ {
    expires 1d;
  }
  location = /favicon.ico {
    expires 1d;
  }

  # Serve images straight from disk when they exist; otherwise fall back to the
  # app, which fetches from DB and materializes the file for next time.
  location /image/ {
    try_files $uri @app;
    expires 1d;
  }

  location @app {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }

  location / {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }
}
