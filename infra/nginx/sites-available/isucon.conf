# Keepalive pool to the Go app so nginx reuses TCP connections instead of
# opening a new one per request (eliminates handshake + TIME_WAIT churn).
upstream app {
  server 127.0.0.1:8080;
  keepalive 128;
  keepalive_requests 100000;
}

server {
  listen 80;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  # Static assets: serve straight from disk, never touch the app.
  location ~* ^/(css|js|img)/ {
    expires 1d;
  }
  location = /favicon.ico {
    expires 1d;
  }

  # Serve images straight from disk when they exist; otherwise fall back to the
  # app, which fetches from DB and materializes the file for next time.
  location /image/ {
    try_files $uri @app;
    expires 1d;
    # Uploaded image files (id>10000) can be replaced across runs at the same
    # path; open_file_cache could serve a stale fd, so disable it here. Seeded
    # images never change, but correctness wins over the tiny open() saving.
    open_file_cache off;
  }

  location @app {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://app;
  }

  location / {
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_pass http://app;
  }
}
