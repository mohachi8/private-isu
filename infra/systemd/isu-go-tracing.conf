# systemd drop-in to enable OpenTelemetry tracing for the Go app.
#
# Enable:
#   sudo mkdir -p /etc/systemd/system/isu-go.service.d
#   sudo cp infra/systemd/isu-go-tracing.conf /etc/systemd/system/isu-go.service.d/tracing.conf
#   sudo systemctl daemon-reload && sudo systemctl restart isu-go
#
# Disable (for scoring runs — tracing adds overhead):
#   sudo rm /etc/systemd/system/isu-go.service.d/tracing.conf
#   sudo systemctl daemon-reload && sudo systemctl restart isu-go
#
# Then open the Jaeger UI (via SSH tunnel from your laptop):
#   ssh -L 16686:localhost:16686 <ec2-host>   ->   http://localhost:16686
[Service]
Environment=ENABLE_TRACING=1
Environment=OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
Environment=OTEL_BSP_SCHEDULE_DELAY=1000
