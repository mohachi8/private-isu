# Kernel network tuning for high connection throughput.
# Deployed to /etc/sysctl.d/99-isucon.conf
net.core.somaxconn          = 32768
net.core.netdev_max_backlog = 8192
net.ipv4.tcp_max_syn_backlog = 8192
# Reuse sockets stuck in TIME_WAIT for new outgoing connections.
net.ipv4.tcp_tw_reuse       = 1
